glm5-fp8-mi355x-sglang:
  image: lmsysorg/sglang-rocm:v0.5.12-rocm720-mi35x-20260517
  model: zai-org/GLM-5-FP8
  model-prefix: glm5
  runner: mi355x
  precision: fp8
  framework: sglang
  multinode: false
  scenarios:
    fixed-seq-len:
    - isl: 8192
      osl: 1024
      search-space:
      - { tp: 4, conc-start: 4, conc-end: 256 }


glm5-fp8-mi355x-sglang-mtp:
