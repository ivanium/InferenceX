name: "svf-vllm-disagg-gb300-2p1d-dep8-dep8-agentic"

# GB300 AgentX reference from NVIDIA/srt-slurm#229: two DEP8 prefill workers
# feeding one DEP8 decode worker at concurrency 1280.

model:
  path: "deepseek-v4-pro"
  container: "vllm/vllm-openai:nightly-dev-arm64-cu13.0.1-c188b96"
  precision: "fp4"

identity:
  model:
    repo: "deepseek-ai/DeepSeek-V4-Pro"
  container:
    image: "vllm/vllm-openai:nightly-dev-arm64-cu13.0.1-c188b96"
  frameworks:
    dynamo: "1.2.1"
    vllm: "0.17.2rc1.dev3675+gc188b96eb"

dynamo:
  hash: "919682da679aa699d5bca9c872f4c1d9a530bbc0"
  install: true

setup_script: vllm-container-deps.sh

slurm:
  time_limit: "8:00:00"

health_check:
  max_attempts: 2160
  interval_seconds: 10

resources:
  gpu_type: "gb300"
  gpus_per_node: 4
  het_jobs: false
  spread_workers: false
  prefill_nodes: 4
  decode_nodes: 2
  prefill_workers: 2
  decode_workers: 1
  gpus_per_prefill: 8
  gpus_per_decode: 8

infra:
  etcd_nats_dedicated_node: false
  nats_max_payload_mb: 32

frontend:
  type: dynamo
  enable_multiple_frontends: false
  args:
    router-mode: "kv"
    router-reset-states: true
    router-temperature: 0.0
    router-queue-threshold: 65536
    active-decode-blocks-threshold: "None"
    active-prefill-tokens-threshold: "None"
    active-prefill-tokens-threshold-frac: "None"
    tokenizer: "fastokens"

backend:
  type: vllm
  dp_launch_mode: per_node
  connector: null
  kv_events_config:
    prefill: true
  mooncake_kv_store:
    store_config:
      metadata_server: "P2PHANDSHAKE"
      global_segment_size: "150GB"
      local_buffer_size: "4GB"
      protocol: "rdma"
      device_name: ""
      mode: "embedded"
      enable_offload: false
  prefill_environment:
    DG_JIT_CACHE_DIR: "/tmp/dg-cache-dsv4-agentx-{job_id}"
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_RPC_TIMEOUT: "600000"
    VLLM_LOG_STATS_INTERVAL: "1"
    VLLM_V2_WARMUP_MAX_NUM_SEQS: "20"
    VLLM_SERVER_DEV_MODE: "1"
    VLLM_USE_V2_MODEL_RUNNER: "1"
    VLLM_MOONCAKE_LOAD_RECV_THREADS: "20"
    VLLM_CONNECTOR_PREFETCH_DEPTH: "8"
    VLLM_DSV4_MEGA_FP8_COMBINE: "1"
    VLLM_ALLREDUCE_USE_SYMM_MEM: "0"
    TILELANG_CLEANUP_TEMP_FILES: "1"
    UCX_MEMTYPE_CACHE: "n"
    UCX_TLS: "rc,cuda_copy"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    VLLM_RANDOMIZE_DP_DUMMY_INPUTS: "1"
    VLLM_PREFIX_CACHE_RETENTION_INTERVAL: "32768"
    VLLM_USE_BREAKABLE_CUDAGRAPH: "0"
    MC_ENABLE_DEST_DEVICE_AFFINITY: "1"
  decode_environment:
    DG_JIT_CACHE_DIR: "/tmp/dg-cache-dsv4-agentx-{job_id}"
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_RPC_TIMEOUT: "600000"
    VLLM_LOG_STATS_INTERVAL: "1"
    VLLM_V2_WARMUP_MAX_NUM_SEQS: "20"
    VLLM_SERVER_DEV_MODE: "1"
    VLLM_USE_V2_MODEL_RUNNER: "1"
    VLLM_MOONCAKE_LOAD_RECV_THREADS: "20"
    VLLM_DSV4_MEGA_FP8_COMBINE: "1"
    VLLM_ALLREDUCE_USE_SYMM_MEM: "0"
    TILELANG_CLEANUP_TEMP_FILES: "1"
    UCX_MEMTYPE_CACHE: "n"
    UCX_TLS: "rc,cuda_copy"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    VLLM_RANDOMIZE_DP_DUMMY_INPUTS: "1"
    VLLM_PREFIX_CACHE_RETENTION_INTERVAL: "32768"
    MC_ENABLE_DEST_DEVICE_AFFINITY: "1"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector":"MultiConnector","kv_role":"kv_both","kv_connector_extra_config":{"connectors":[{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_load_failure_policy":"fail","kv_buffer_device":"cuda","kv_connector_extra_config":{"enforce_handshake_compat":false,"enable_cross_layers_blocks":false}},{"kv_connector":"MooncakeStoreConnector","kv_role":"kv_both","kv_connector_extra_config":{"load_async":true,"lookup_async":true,"enable_cross_layers_blocks":false,"enable_offload":false}}]}}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 8
      data-parallel-rpc-port: 13345
      data-parallel-hybrid-lb: true
      enable-cumem-allocator: true
      enable-expert-parallel: true
      enable-ep-weight-filter: true
      max-model-len: 1048576
      max-num-seqs: 32
      max-num-batched-tokens: 8192
      trust-remote-code: true
      no-enable-flashinfer-autotune: true
      block-size: 256
      gpu-memory-utilization: 0.92
      no-disable-hybrid-kv-cache-manager: true
      tokenizer-mode: deepseek_v4
      attention-config: '{"backend":"FLASHINFER_MLA_SPARSE_DSV4","use_prefill_query_quantization":true,"use_fp4_indexer_cache":true}'
      moe-backend: "deep_gemm_amxf4_mega_moe"
      numa-bind: true
      numa-bind-nodes: [0, 0, 1, 1]
    decode:
      kv-transfer-config: '{"kv_connector":"MultiConnector","kv_role":"kv_both","kv_connector_extra_config":{"connectors":[{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_load_failure_policy":"fail","kv_buffer_device":"cuda","kv_connector_extra_config":{"enforce_handshake_compat":false,"enable_cross_layers_blocks":false}},{"kv_connector":"MooncakeStoreConnector","kv_role":"kv_both","kv_connector_extra_config":{"load_async":true,"lookup_async":true,"enable_cross_layers_blocks":false,"enable_offload":false}}]}}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 8
      data-parallel-rpc-port: 13345
      data-parallel-hybrid-lb: true
      enable-cumem-allocator: true
      enable-expert-parallel: true
      enable-ep-weight-filter: true
      max-model-len: 1048576
      max-num-seqs: 256
      max-num-batched-tokens: 512
      trust-remote-code: true
      no-enable-flashinfer-autotune: true
      block-size: 256
      compilation-config: '{"cudagraph_mode":"FULL_DECODE_ONLY","mode":0}'
      max-cudagraph-capture-size: 256
      gpu-memory-utilization: 0.95
      no-disable-hybrid-kv-cache-manager: true
      tokenizer-mode: deepseek_v4
      attention-config: '{"backend":"FLASHINFER_MLA_SPARSE_DSV4","use_prefill_query_quantization":true,"use_fp4_indexer_cache":true}'
      moe-backend: "deep_gemm_amxf4_mega_moe"
      numa-bind: true
      numa-bind-nodes: [0, 0, 1, 1]

sbatch_directives:
  cpus-per-task: "72"

srun_options:
  container-remap-root: ""

benchmark:
  type: custom
  command: bash /infmax-workspace/benchmarks/multi_node/agentic_srt.sh
  env:
    INFMAX_CONTAINER_WORKSPACE: /infmax-workspace
    RESULT_DIR: /logs/agentic
    PORT: "8000"
    IS_MULTINODE: "true"
    AIPERF_USE_DYNAMO_CONV_AWARE_ROUTING: "0"
    AIPERF_DYNAMO_SESSION_TIMEOUT_SECONDS: "14400"
    AIPERF_DATASET_MMAP_CACHE_DIR: "/aiperf_mmap_cache"
    HF_HUB_CACHE: "/hf_hub_cache"
    WEKA_LOADER_OVERRIDE: "semianalysis_cc_traces_weka_062126"
