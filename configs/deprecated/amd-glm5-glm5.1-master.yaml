      - { tp: 8, conc-start: 4, conc-end: 8, spec-decoding: mtp }


glm5-fp8-mi355x-sglang-disagg:
  image: lmsysorg/sglang-rocm:v0.5.12.post1-rocm720-mi35x-20260523
  model: zai-org/GLM-5-FP8
  model-prefix: glm5
  runner: mi355x-disagg
  precision: fp8
  framework: sglang-disagg
  router: { name: sglang-router, version: "0.3.2" }
  kv-p2p-transfer: mori
  multinode: true
  disagg: true
  scenarios:
    fixed-seq-len:
    - isl: 8192
      osl: 1024
      search-space:
      # 1P+1D TP8/EP1 CI smoke sweep; dp-attn false (NSA / MoRI path)
      - spec-decoding: "none"
        conc-list: [ 8, 16, 32, 64, 128, 256, 512 ]
        prefill:
          num-worker: 1
          tp: 8
          ep: 1
          dp-attn: false
          additional-settings:
          - "PREFILL_NODES=1"
        decode:
          num-worker: 1
          tp: 8
          ep: 1
          dp-attn: false
          additional-settings:
          - "DECODE_NODES=1"
          - "DECODE_MTP_SIZE=0"


