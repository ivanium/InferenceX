        decode:
          num-worker: 1
          tp: 4
          ep: 1
          dp-attn: false
          additional-settings:
          - "DECODE_NODES=1"
          - "DECODE_MTP_SIZE=0"
      # 2P1D, DPA TP4
      - conc-list: [ 256, 512, 768, 1024 ]
        prefill:
          num-worker: 2
          tp: 4
          ep: 1
          dp-attn: true
          additional-settings:
          - "PREFILL_NODES=2"
        decode:
          num-worker: 1
          tp: 4
          ep: 1
          dp-attn: true
          additional-settings:
          - "DECODE_NODES=1"
          - "DECODE_MTP_SIZE=0"
      # 1P1D TP4
    - isl: 1024
      osl: 1024
      search-space:
      # 1P1D TP4
      - conc-list: [ 1, 2, 4, 8, 16, 32, 64, 128, 256 ]
        prefill:
          num-worker: 1
          tp: 4
          ep: 1
          dp-attn: false
          additional-settings:
          - "PREFILL_NODES=1"
        decode:
          num-worker: 1
          tp: 4
          ep: 1
          dp-attn: false
          additional-settings:
          - "DECODE_NODES=1"
          - "DECODE_MTP_SIZE=0"

